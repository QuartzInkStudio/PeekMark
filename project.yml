name: PeekMark
options:
  bundleIdPrefix: app.peekmark
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  QuickMarkCore:
    path: QuickMarkCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  PeekMark:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QuickMarkApp/Sources
        createIntermediateGroups: true
    dependencies:
      - package: QuickMarkCore
        product: QuickMarkCore
      - package: Sparkle
        product: Sparkle
      - target: PeekMarkQL
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.peekmark.PeekMark
        PRODUCT_NAME: PeekMark
        INFOPLIST_FILE: QuickMarkApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickMarkApp/QuickMarkApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: QuickMarkApp/QuickMarkApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.peekmark.PeekMark

  PeekMarkQL:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QuickMarkQL/Sources
        createIntermediateGroups: true
    dependencies:
      - package: QuickMarkCore
        product: QuickMarkCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.peekmark.PeekMark.PeekMarkQL
        PRODUCT_NAME: PeekMarkQL
        INFOPLIST_FILE: QuickMarkQL/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickMarkQL/QuickMarkQL.entitlements
    entitlements:
      path: QuickMarkQL/QuickMarkQL.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.peekmark.PeekMark
