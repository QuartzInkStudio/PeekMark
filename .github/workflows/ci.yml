name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (unsigned)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build QuickMarkCore (SPM)
        run: |
          cd QuickMarkCore
          swift build

      - name: Build PeekMark (xcodebuild)
        run: |
          xcodebuild \
            -project PeekMark.xcodeproj \
            -scheme PeekMark \
            -configuration Debug \
            -destination "platform=macOS" \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
