<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src file: data:; media-src file: data:; font-src file: data:; style-src 'unsafe-inline'; script-src 'nonce-{{SCRIPT_NONCE}}'; connect-src 'none'; object-src 'none'; frame-src 'none'; worker-src 'none'; base-uri 'none'; form-action 'none'">
<title>{{TITLE}}</title>
<style>
/* ---------- Light theme variables (default) ---------- */
:root, .markdown-body {
  --fgColor-default: #1f2328;
  --fgColor-muted: #59636e;
  --fgColor-accent: #0969da;
  --bgColor-default: #ffffff;
  --bgColor-muted: #f6f8fa;
  --bgColor-neutral-muted: #818b981f;
  --borderColor-default: #d1d9e0;
  --borderColor-muted: #d1d9e0b3;
  --fontStack-monospace: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  color-scheme: light;
}

@media (prefers-color-scheme: dark) {
  :root, .markdown-body {
    --fgColor-default: #f0f6fc;
    --fgColor-muted: #9198a1;
    --fgColor-accent: #4493f8;
    --bgColor-default: #0d1117;
    --bgColor-muted: #151b23;
    --bgColor-neutral-muted: #656c7633;
    --borderColor-default: #3d444d;
    --borderColor-muted: #3d444db3;
    color-scheme: dark;
  }
}

/* ---------- Page chrome ---------- */
html, body {
  margin: 0;
  padding: 0;
  background-color: var(--bgColor-default);
  color: var(--fgColor-default);
}

/* ---------- Markdown body ---------- */
.markdown-body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  font-size: 16px;
  line-height: 1.5;
  font-weight: 400;
  color: var(--fgColor-default);
  background-color: var(--bgColor-default);
  word-wrap: break-word;
  box-sizing: border-box;
  min-width: 200px;
  max-width: 980px;
  margin: 0 auto;
  padding: 45px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
@media (max-width: 767px) {
  .markdown-body { padding: 15px; }
}

/* ---------- Block rhythm ---------- */
.markdown-body p,
.markdown-body blockquote,
.markdown-body ul,
.markdown-body ol,
.markdown-body dl,
.markdown-body table,
.markdown-body pre,
.markdown-body details {
  margin-top: 0;
  margin-bottom: 1rem;
}
.markdown-body p { margin-bottom: 10px; }

/* ---------- Headings ---------- */
.markdown-body h1,
.markdown-body h2,
.markdown-body h3,
.markdown-body h4,
.markdown-body h5,
.markdown-body h6 {
  font-weight: 600;
  line-height: 1.25;
  margin-top: 1.5rem;
  margin-bottom: 1rem;
}
.markdown-body h1 { font-size: 2em; }
.markdown-body h2 { font-size: 1.5em; }
.markdown-body h3 { font-size: 1.25em; }
.markdown-body h4 { font-size: 1em; }
.markdown-body h5 { font-size: 0.875em; }
.markdown-body h6 { font-size: 0.85em; color: var(--fgColor-muted); }
.markdown-body h1,
.markdown-body h2 {
  padding-bottom: 0.3em;
  border-bottom: 1px solid var(--borderColor-muted);
}

/* ---------- Code ---------- */
.markdown-body code,
.markdown-body tt {
  font-family: var(--fontStack-monospace);
  font-size: 85%;
  padding: 0.2em 0.4em;
  white-space: break-spaces;
  background-color: var(--bgColor-neutral-muted);
  border-radius: 6px;
}
.markdown-body pre {
  font-family: var(--fontStack-monospace);
  font-size: 85%;
  line-height: 1.45;
  padding: 1rem;
  overflow: auto;
  background-color: var(--bgColor-muted);
  border-radius: 6px;
  margin-bottom: 1rem;
}
.markdown-body pre code,
.markdown-body pre tt {
  font-size: 100%;
  padding: 0;
  background: transparent;
  border: 0;
  white-space: pre;
  word-break: normal;
  display: inline;
  overflow: visible;
  line-height: inherit;
}

/* ---------- Blockquote ---------- */
.markdown-body blockquote {
  padding: 0 1em;
  color: var(--fgColor-muted);
  border-left: 0.25em solid var(--borderColor-default);
}

/* ---------- Lists ---------- */
.markdown-body ul,
.markdown-body ol {
  padding-left: 2em;
}
.markdown-body li + li { margin-top: 0.25em; }
.markdown-body li > p { margin-top: 1rem; }
.markdown-body .task-list-item { list-style-type: none; }

/* ---------- Tables ---------- */
.markdown-body table {
  display: block;
  width: max-content;
  max-width: 100%;
  overflow: auto;
  border-collapse: collapse;
  font-variant: tabular-nums;
}
.markdown-body th,
.markdown-body td {
  padding: 6px 13px;
  border: 1px solid var(--borderColor-default);
}
.markdown-body th { font-weight: 600; }
.markdown-body tr:nth-child(2n) {
  background-color: var(--bgColor-muted);
}

/* ---------- Horizontal rule ---------- */
.markdown-body hr {
  height: 0.25em;
  margin: 1.5rem 0;
  background-color: var(--borderColor-default);
  border: 0;
}

/* ---------- Links ---------- */
.markdown-body a {
  color: var(--fgColor-accent);
  text-decoration: none;
}
.markdown-body a:hover {
  text-decoration: underline;
  text-underline-offset: 0.2rem;
}

/* ---------- Images ---------- */
.markdown-body img {
  max-width: 100%;
  box-sizing: content-box;
  border-style: none;
  background-color: transparent;
}

/* ---------- highlight.js themes (inlined) ---------- */
{{HIGHLIGHT_LIGHT_CSS}}

@media (prefers-color-scheme: dark) {
  {{HIGHLIGHT_DARK_CSS}}
}
</style>
</head>
<body>
<article class="markdown-body">
{{CONTENT}}
</article>
<script nonce="{{SCRIPT_NONCE}}">
{{HIGHLIGHT_JS}}
</script>
<script nonce="{{SCRIPT_NONCE}}">
(function() {
  function run() {
    if (typeof hljs !== 'undefined' && typeof hljs.highlightAll === 'function') {
      try { hljs.highlightAll(); } catch (e) { /* swallow */ }
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
</script>
</body>
</html>
